<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ConjuExpert — Verb Conjugator</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0a84ff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="ConjuExpert" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Rubik:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --radius: 22px;
  --font-display: "Space Grotesk", system-ui, sans-serif;
  --font-body: "Space Grotesk", system-ui, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, monospace;
  --gap: 17px;
  --pad: 20px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font-body);
  background:
    radial-gradient(1200px 600px at 20% -10%, #ffe9f0 0%, transparent 55%),
    radial-gradient(1000px 600px at 110% 10%, #e6f0ff 0%, transparent 50%),
    #eef0f4;
  display: flex; align-items: center; justify-content: center;
  min-height: 100dvh;
  color: #14151a;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility;
}

/* ===== Theme tokens ===== */
#approot {
  --bg: #f3f4f8;
  --surface: #ffffff;
  --surface-2: #f7f8fb;
  --text: #14151a;
  --muted: #707888;
  --border: rgba(20, 22, 30, 0.08);
  --shadow: 0 18px 50px -22px rgba(30, 35, 60, 0.35);
  --shadow-sm: 0 6px 18px -10px rgba(30, 35, 60, 0.3);
}
#approot[data-theme="dark"] {
  --bg: #0a0c14;
  --surface: #141826;
  --surface-2: #0f1320;
  --text: #eef1fa;
  --muted: #8a92a8;
  --border: rgba(255, 255, 255, 0.09);
  --shadow: 0 24px 60px -24px rgba(0, 0, 0, 0.8);
  --shadow-sm: 0 8px 22px -12px rgba(0, 0, 0, 0.7);
}
#approot[data-theme="playful"] {
  --bg: #fff7fb;
  --surface: #ffffff;
  --surface-2: #fff0f6;
  --text: #1a1430;
  --muted: #7c6f95;
  --border: rgba(120, 60, 160, 0.12);
  --shadow: 0 22px 55px -22px rgba(150, 60, 160, 0.5);
  --shadow-sm: 0 8px 20px -12px rgba(150, 60, 160, 0.45);
}
#approot[data-accent="soft"] { --acc-sat: 0.78; }
#approot[data-accent="mono"] { --acc-sat: 0; }

#approot[data-font="space"] { --font-display: "Space Grotesk", sans-serif; --font-body: "Space Grotesk", sans-serif; }
#approot[data-font="sora"]  { --font-display: "Sora", sans-serif; --font-body: "Sora", sans-serif; }
#approot[data-font="jakarta"] { --font-display: "Plus Jakarta Sans", sans-serif; --font-body: "Plus Jakarta Sans", sans-serif; }

#approot[data-density="compact"] { --gap: 12px; --pad: 16px; }
#approot[data-density="comfy"]   { --gap: 22px; --pad: 26px; }

/* ===== Phone frame ===== */
.phone {
  width: 100%;
  max-width: 440px;
  height: 100dvh;
  max-height: 940px;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  border-radius: 0;
  transition: background 0.4s;
}
@media (min-width: 480px) {
  .phone {
    border-radius: 40px;
    box-shadow: var(--shadow), 0 0 0 10px #0c0e16, 0 0 0 12px rgba(255,255,255,0.06);
    height: min(94dvh, 920px);
    overflow: hidden;
  }
}

/* ===== App bar ===== */
.appbar {
  padding: max(env(safe-area-inset-top), 16px) var(--pad) 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 5;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.appbar::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 3px;
  background: linear-gradient(90deg, #ff3b5c, #ff7a18, #ffc400, #34c759, #00bcd4, #0a84ff, #a557ff);
  opacity: var(--acc-sat, 1);
  filter: saturate(calc(var(--acc-sat, 1)));
}
#approot[data-accent="mono"] .appbar::after { background: var(--text); opacity: 0.25; }
.brand { display: flex; align-items: center; gap: 12px; }
.brand-mark {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px;
  width: 34px; height: 34px; padding: 5px;
  background: var(--surface-2); border-radius: 11px; align-items: stretch;
  box-shadow: var(--shadow-sm);
}
.brand-mark i { display: block; border-radius: 3px; }
.brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.brand-name { font-family: var(--font-display); font-weight: 600; font-size: 20px; letter-spacing: -0.02em; }
.brand-name b { font-weight: 700; background: linear-gradient(90deg, #0a84ff, #a557ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
#approot[data-accent="mono"] .brand-name b { background: none; color: var(--text); }
.brand-tag { font-size: 10.5px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; white-space: nowrap; }

/* ===== Language bar ===== */
.langbar {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
  padding: 14px var(--pad);
  background: var(--surface);
}
.langbtn {
  position: relative; border: 1px solid var(--border); background: var(--surface-2);
  border-radius: 14px; padding: 9px 2px 8px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  font-family: var(--font-body); color: var(--muted);
  overflow: hidden; transition: transform 0.15s, border-color 0.2s, color 0.2s, background 0.2s;
}
.langbtn:active { transform: scale(0.95); }
.langstripe { position: absolute; top: 0; left: 0; right: 0; height: 4px; opacity: 0.55; transition: height 0.2s, opacity 0.2s; }
#approot[data-accent="mono"] .langstripe { background: var(--text) !important; opacity: 0.3; }
.langbtn.active {
  color: var(--text); border-color: color-mix(in srgb, var(--lc) 55%, transparent);
  background: color-mix(in srgb, var(--lc) 12%, var(--surface));
  box-shadow: 0 8px 22px -12px var(--lc);
}
.langbtn.active .langstripe { height: 6px; opacity: 1; }
.langflag { font-size: 20px; line-height: 1; margin-top: 4px; font-family: var(--font-display); font-weight: 700; }
.langname { font-size: 9.5px; font-weight: 500; letter-spacing: 0; margin-top: 1px; white-space: nowrap; }

/* ===== Tabs ===== */
.tabs { padding: 8px var(--pad) 12px; background: var(--surface); border-bottom: 1px solid var(--border); }
.tabs-track {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
}
.tab {
  border: 1.5px solid transparent; cursor: pointer;
  background: var(--surface-2); color: var(--muted);
  padding: 7px 4px 6px; border-radius: 12px; font-family: var(--font-display);
  font-weight: 600; font-size: 12px; letter-spacing: -0.01em;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  transition: color 0.18s, background 0.18s, border-color 0.18s, box-shadow 0.18s, transform 0.12s;
  white-space: nowrap; overflow: hidden; min-height: 46px;
}
.tab-icon { font-size: 11px; opacity: 0.7; line-height: 1; }
.tab:not(.active):hover { color: var(--text); border-color: color-mix(in srgb, var(--lang-color, #0a84ff) 30%, transparent); }
.tab:active { transform: scale(0.95); }
.tab.active {
  color: var(--text);
  background: color-mix(in srgb, var(--lang-color, #0a84ff) 12%, var(--surface));
  border-color: var(--lang-color, #0a84ff);
  box-shadow: 0 6px 16px -11px var(--lang-color, #0a84ff);
}
.tab.active .tab-icon { opacity: 1; color: var(--lang-color, #0a84ff); }
#approot[data-accent="mono"] .tab.active { border-color: var(--text); background: color-mix(in srgb, var(--text) 9%, var(--surface)); }
#approot[data-accent="mono"] .tab.active .tab-icon { color: var(--text); }

/* ===== Content ===== */
.offlinebar { background: color-mix(in srgb, #ff7a18 16%, var(--surface)); color: #b3540a; font-family: var(--font-display); font-weight: 600; font-size: 12.5px; text-align: center; padding: 7px 14px; border-bottom: 1px solid color-mix(in srgb, #ff7a18 30%, var(--border)); }
#approot[data-theme="dark"] .offlinebar { color: #ffb068; }
.content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; background: color-mix(in srgb, var(--lang-color, transparent) 8%, var(--bg)); transition: background 0.4s; }
.content::-webkit-scrollbar { width: 0; }
.view { padding: var(--pad) var(--pad) 40px; display: flex; flex-direction: column; gap: var(--gap); animation: fade 0.35s ease both; }
@media (prefers-reduced-motion: no-preference) {
  @keyframes fade { from { transform: translateY(7px); } to { transform: none; } }
}

/* ===== Input ===== */
.inputwrap { display: flex; flex-direction: column; gap: 10px; }
.inputfield {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 4px 6px 4px 14px;
  box-shadow: var(--shadow-sm); transition: border-color 0.2s, box-shadow 0.2s;
}
.inputfield:focus-within { border-color: #0a84ff; box-shadow: 0 0 0 4px rgba(10,132,255,0.12); }
.inputlead { font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: 0.02em; color: var(--lc, var(--muted)); background: color-mix(in srgb, var(--lc, var(--muted)) 14%, transparent); padding: 5px 9px; border-radius: 9px; flex: none; }
.inputfield input {
  flex: 1; border: 0; outline: 0; background: transparent; color: var(--text);
  font-family: var(--font-display); font-size: 18px; font-weight: 500; padding: 14px 0;
}
.inputfield input::placeholder { color: var(--muted); font-weight: 400; }
.clearbtn { border: 0; background: var(--surface-2); color: var(--muted); width: 30px; height: 30px; border-radius: 50%; font-size: 18px; cursor: pointer; line-height: 1; }
.cta {
  position: relative; border: 0; cursor: pointer; border-radius: var(--radius);
  padding: 16px; font-family: var(--font-display); font-weight: 700; font-size: 16px;
  color: #fff; overflow: hidden; letter-spacing: 0.01em;
  box-shadow: 0 14px 30px -12px rgba(120, 40, 200, 0.6);
  transition: transform 0.14s;
}
.cta:active { transform: scale(0.97); }
.cta-rainbow { position: absolute; inset: 0; background: linear-gradient(100deg, #ff3b5c, #ff7a18, #ffc400, #34c759, #00bcd4, #0a84ff, #a557ff); background-size: 220% 100%; animation: slide 6s linear infinite; }
#approot[data-accent="soft"] .cta-rainbow { filter: saturate(0.7); }
#approot[data-accent="mono"] .cta-rainbow { background: linear-gradient(100deg, #2b2f3a, #4a4f60); animation: none; }
@keyframes slide { to { background-position: 220% 0; } }
.cta-label { position: relative; z-index: 2; }

/* ===== Chips ===== */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  border: 1px solid var(--border); background: var(--surface); color: var(--muted);
  border-radius: 999px; padding: 7px 13px; font-size: 13px; font-family: var(--mono);
  cursor: pointer; transition: all 0.15s;
}
.chip:active { transform: scale(0.94); }
.chip:hover { color: var(--text); border-color: color-mix(in srgb, #0a84ff 40%, transparent); }

/* ===== Empty state ===== */
.emptystate { text-align: center; padding: 48px 20px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.emptystate-rings { display: flex; gap: 7px; margin-bottom: 14px; }
.emptystate-rings span { width: 12px; height: 12px; border-radius: 50%; animation: bounce 1.3s ease-in-out infinite; }
@keyframes bounce { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-10px); opacity: 1; } }
.emptystate-title { font-family: var(--font-display); font-weight: 600; font-size: 18px; margin: 0; }
.emptystate-sub { color: var(--muted); font-size: 13.5px; margin: 0; max-width: 250px; line-height: 1.5; text-wrap: pretty; }

/* ===== Result ===== */
.errorbox { background: color-mix(in srgb, #ff3b5c 10%, var(--surface)); border: 1px solid color-mix(in srgb, #ff3b5c 35%, transparent); color: color-mix(in srgb, #ff3b5c 75%, var(--text)); border-radius: 14px; padding: 14px 16px; font-size: 14px; line-height: 1.5; }
.resultwrap { display: flex; flex-direction: column; gap: 12px; }
.resulthead {
  position: relative; background: var(--surface); border: 1px solid var(--border);
  border-left: 4px solid var(--lc); border-radius: var(--radius); padding: 15px 18px 13px;
  box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 2px;
}
.rh-top { display: flex; align-items: center; gap: 8px; }
.rh-lang { font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: 0.03em; color: var(--lc); background: color-mix(in srgb, var(--lc) 14%, transparent); padding: 4px 9px; border-radius: 7px; }
.rh-top .starbtn { margin-left: auto; width: 34px; height: 34px; }
.rh-verb { font-family: var(--font-display); font-weight: 700; font-size: 31px; letter-spacing: -0.02em; color: var(--text); margin: 8px 0 0; line-height: 1.04; }
.rh-meaning { display: inline-flex; align-items: baseline; gap: 8px; font-size: 14px; color: var(--muted); margin: 6px 0 0; }
.rh-meaning b { font-family: var(--font-display); font-weight: 600; font-size: 13.5px; color: var(--text); }
.rh-meaning b::after { content: "→"; color: var(--muted); margin-left: 8px; font-weight: 400; }
.rh-meaning em { font-style: normal; font-weight: 700; color: var(--lc, var(--text)); }
.rh-actions { display: flex; gap: 6px; margin-top: 13px; padding-top: 11px; border-top: 1px solid var(--border); }
.resulthead-sub { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 8px; }
.badge { font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 999px; font-family: var(--mono); letter-spacing: 0.02em; }
.badge.reg { background: color-mix(in srgb, #34c759 16%, var(--surface)); color: #1a9b46; }
.badge.irr { background: color-mix(in srgb, #ff7a18 18%, var(--surface)); color: #d4660a; }
#approot[data-theme="dark"] .badge.reg { color: #4ade80; }
#approot[data-theme="dark"] .badge.irr { color: #ffa450; }

/* ===== Tense card ===== */
.tcard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
.tcard-head { width: 100%; display: flex; align-items: center; gap: 12px; padding: 17px 18px; border: 0; background: transparent; cursor: pointer; font-family: var(--font-display); color: var(--text); }
.tcard-dot { width: 10px; height: 10px; border-radius: 3px; background: var(--dot, var(--tc)); box-shadow: 0 0 12px -2px var(--dot, var(--tc)); flex: none; }
#approot[data-accent="mono"] .tcard-dot { background: var(--muted); box-shadow: none; }
.tcard-title { flex: 1; text-align: left; font-weight: 600; font-size: 15.5px; }
.tcard-caret { font-size: 20px; color: var(--muted); width: 22px; text-align: center; }
.tcard-body { max-height: 0; overflow: hidden; transition: max-height 0.33s ease; }
.tcard.open .tcard-body { max-height: 1400px; }
.tcard-rows { overflow: hidden; }
.conjrow { display: flex; align-items: center; gap: 12px; padding: 13px 18px 13px 40px; border-top: 1px solid var(--border); }
.conjrow .pron { width: 96px; flex: none; color: var(--muted); font-size: 13px; }
.conjrow .form { font-family: var(--mono); font-weight: 600; font-size: 15px; color: var(--text); }

/* ===== Quiz ===== */
.scoreline { display: flex; align-items: center; gap: 9px; font-family: var(--font-display); font-size: 13px; color: var(--muted); padding: 2px 4px; }
.scoreline .sl-item b { color: var(--lc, var(--text)); font-weight: 700; }
.scoreline .sl-sep { opacity: 0.45; }
.scoreline .sl-streak { margin-left: auto; font-weight: 600; color: var(--text); }
.scorebar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.scorestat { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 12px 8px; text-align: center; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 1px; }
.scorestat b { font-family: var(--font-display); font-size: 22px; font-weight: 700; line-height: 1; }
.scorestat span { font-size: 11px; color: var(--muted); }
.scorestat label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 3px; }
.scorestat.streak b { background: linear-gradient(90deg, #ff7a18, #ff3b5c); -webkit-background-clip: text; background-clip: text; color: transparent; }

.quizcard { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 22px 20px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 16px; transition: border-color 0.3s; }
.quizcard.correct { border-color: color-mix(in srgb, #34c759 55%, transparent); }
.quizcard.wrong { border-color: color-mix(in srgb, #ff3b5c 55%, transparent); }
.quizcard.quizmodern { position: relative; overflow: hidden; gap: 13px; padding-top: 20px; }
.quizcard.quizmodern::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--lc); opacity: 0.9; }
.qm-top { display: flex; align-items: center; gap: 8px; }
.qm-star { margin-left: auto; width: 34px; height: 34px; }
.flashverb-link { border: 0; background: transparent; cursor: pointer; font: inherit; color: inherit; padding: 2px 6px; display: inline-flex; align-items: center; gap: 7px; border-radius: 10px; transition: background 0.15s, transform 0.12s; }
.flashverb-link:hover { background: color-mix(in srgb, var(--lc, #0a84ff) 9%, transparent); }
.flashverb-link:active { transform: scale(0.97); }
.flashverb-link .qm-study-ic { font-size: 0.6em; color: var(--lc, #0a84ff); opacity: 0.85; }
.qm-prompt { display: flex; flex-direction: column; align-items: center; gap: 11px; text-align: center; padding: 6px 0; }
.qm-mean { text-align: center; min-height: 20px; display: flex; gap: 8px; justify-content: center; align-items: baseline; font-size: 14.5px; color: var(--muted); margin-top: -2px; }
.qm-mean b { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--text); }
.qm-mean b::after { content: "→"; color: var(--muted); margin-left: 8px; font-weight: 400; }
.qm-mean em { font-style: normal; font-weight: 700; color: var(--lc); }
.qm-mean-ph { opacity: 0.3; }
.quizmeta { display: flex; gap: 7px; }
.quizpill { font-size: 11px; font-family: var(--mono); padding: 5px 11px; border-radius: 999px; background: var(--surface-2); color: var(--muted); border: 1px solid var(--border); }
.quizpill.irr { background: color-mix(in srgb, #ff7a18 16%, var(--surface)); color: #d4660a; border-color: transparent; }
.quizprompt { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 6px 0; }
.quizverb { font-family: var(--font-display); font-weight: 700; font-size: 27px; letter-spacing: -0.02em; }
.quizverb-link { border: 0; background: transparent; cursor: pointer; color: inherit; padding: 2px 8px; display: inline-flex; align-items: center; gap: 7px; border-radius: 10px; transition: background 0.15s, transform 0.12s; }
.quizverb-link:hover { background: color-mix(in srgb, var(--lc, #0a84ff) 9%, transparent); }
.quizverb-link:active { transform: scale(0.97); }
.quizverb-link .qm-study-ic { font-size: 0.55em; color: var(--lc, #0a84ff); opacity: 0.85; }
.quizarrow { color: var(--muted); font-size: 20px; }
.quizpron { font-family: var(--font-display); font-weight: 600; font-size: 20px; color: var(--lc, #0a84ff); background: color-mix(in srgb, var(--lc, #0a84ff) 13%, transparent); padding: 4px 12px; border-radius: 10px; }
.quizinput input { width: 100%; border: 1.5px solid var(--border); background: var(--surface-2); border-radius: 14px; padding: 15px 16px; font-family: var(--mono); font-weight: 600; font-size: 17px; color: var(--text); outline: 0; transition: border-color 0.2s, box-shadow 0.2s; }
.quizinput input::placeholder { font-weight: 400; font-family: var(--font-body); color: var(--muted); }
.quizinput input:focus { border-color: var(--lc, #0a84ff); box-shadow: 0 0 0 4px color-mix(in srgb, var(--lc, #0a84ff) 14%, transparent); }
.quizinput input:disabled { opacity: 0.85; }
.feedback { font-size: 15px; font-weight: 600; font-family: var(--font-display); padding: 2px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.feedback.ok { color: #1a9b46; }
.feedback.no { color: color-mix(in srgb, #ff3b5c 80%, var(--text)); }
.feedback.no b { font-family: var(--mono); }
.quizbtn { border: 0; cursor: pointer; border-radius: 14px; padding: 14px 15px; min-height: 52px; font-family: var(--font-display); font-weight: 700; font-size: 15.5px; color: #fff; transition: transform 0.14s; }
.quizbtn:active { transform: scale(0.97); }
.quizbtn.check, .quizbtn.next, .quizbtn.gotit, .quizbtn.qm-check { background: var(--lc, #0a84ff); color: #fff; box-shadow: 0 8px 20px -13px var(--lc, #0a84ff); }
#approot[data-accent="mono"] .quizbtn.check, #approot[data-accent="mono"] .quizbtn.next, #approot[data-accent="mono"] .quizbtn.gotit, #approot[data-accent="mono"] .quizbtn.qm-check { background: var(--text); box-shadow: none; }
.quizhint { text-align: center; font-size: 12.5px; color: var(--muted); margin: 2px 0 0; }

/* ===== Grammar ===== */
.grammar-intro { display: flex; align-items: center; gap: 14px; padding: 4px 2px 6px; }
.grammar-flag { font-size: 34px; }
.grammar-intro h3 { font-family: var(--font-display); font-size: 19px; font-weight: 600; margin: 0 0 2px; }
.grammar-intro p { font-size: 13px; color: var(--muted); margin: 0; }
.grammar-list { display: flex; flex-direction: column; gap: 12px; }
.gcard { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px 16px 22px; box-shadow: var(--shadow-sm); overflow: hidden; }
.gcard-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: var(--gc); }
#approot[data-accent="mono"] .gcard-bar { background: var(--muted); }
.gcard h4 { font-family: var(--font-display); font-size: 15.5px; font-weight: 600; margin: 0 0 7px; }
.gcard p { font-size: 13.5px; line-height: 1.6; color: var(--muted); margin: 0; text-wrap: pretty; }
.gcard p b { color: var(--text); font-weight: 600; }
.gcard p i { color: color-mix(in srgb, var(--gc) 60%, var(--text)); font-style: italic; }

/* ===== New: speaker, highlight, filters, favorites ===== */
.conjrow { position: relative; }
.conjrow .form { flex: 1; }
.speakbtn {
  border: 0; background: transparent; color: var(--muted); cursor: pointer;
  width: 30px; height: 30px; border-radius: 9px; flex: none; opacity: 0.55;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-size: 15px;
}
.speakbtn:hover { opacity: 1; background: var(--surface-2); color: var(--tc, #0a84ff); }
.speakbtn:active { transform: scale(0.88); }
.irrmark { background: color-mix(in srgb, var(--tc, #ff7a18) 26%, transparent); color: inherit; border-radius: 4px; padding: 0 2px; font-weight: 700; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
#approot[data-accent="mono"] .irrmark { background: color-mix(in srgb, var(--text) 16%, transparent); }

.tfilter { display: flex; flex-wrap: wrap; gap: 5px; padding: 2px 2px 4px; margin: 0 -2px; }
.tfilter::-webkit-scrollbar { height: 0; }
.tfilterchip {
  border: 1px solid var(--border); background: var(--surface); color: var(--muted);
  border-radius: 999px; padding: 7px 12px; font-size: 13px; font-family: var(--font-display); font-weight: 500;
  cursor: pointer; white-space: nowrap; flex: none; transition: all 0.15s; display: flex; align-items: center; gap: 7px;
}
.tfilterchip .dotmini { width: 7px; height: 7px; border-radius: 2px; background: var(--cc); opacity: 0.5; }
.tfilterchip.on { color: var(--text); border-color: color-mix(in srgb, var(--cc) 55%, transparent); background: color-mix(in srgb, var(--cc) 10%, var(--surface)); }
.tfilterchip.on .dotmini { opacity: 1; }

.starbtn { border: 0; background: var(--surface-2); cursor: pointer; width: 38px; height: 38px; border-radius: 12px; font-size: 18px; color: var(--muted); flex: none; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
.starbtn.on { color: #ffb300; background: color-mix(in srgb, #ffb300 14%, var(--surface)); }
.starbtn:active { transform: scale(0.9); }
.resulthead-verb-row { display: flex; align-items: center; gap: 10px; }
.meaning { font-size: 13px; color: var(--muted); margin-top: 3px; font-style: italic; }
.meaning b { color: var(--text); font-style: normal; font-weight: 600; }

.recent { display: flex; flex-direction: column; gap: 8px; }
.recent-head { display: flex; align-items: center; justify-content: space-between; }
.recent-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; }
.recent-clear { border: 0; background: transparent; color: var(--muted); font-size: 11px; cursor: pointer; text-decoration: underline; }
.recent-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.recentchip { border: 1px solid var(--border); background: var(--surface); border-radius: 10px; padding: 6px 10px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 7px; color: var(--text); font-family: var(--mono); transition: all 0.15s; }
.recentchip:active { transform: scale(0.94); }
.recentchip .rc-flag { font-family: var(--font-display); font-weight: 700; font-size: 10px; color: var(--muted); }
.recentchip .rc-star { color: #ffb300; font-size: 11px; }

.dicebtn { border: 1.5px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; border-radius: var(--radius); width: 56px; flex: none; font-size: 22px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); transition: transform 0.14s; }
.dicebtn:active { transform: scale(0.92) rotate(-12deg); }
.inputrow { display: flex; gap: 10px; align-items: stretch; }
.inputrow .inputfield { flex: 1; }
.nativealt { margin-top: -4px; }
.nativefield { padding: 2px 6px 2px 12px; box-shadow: none; background: var(--surface-2); border-style: dashed; }
.nativefield input { font-family: var(--font-body); font-size: 15.5px; font-weight: 500; padding: 11px 0; }
.nativefield input::placeholder { font-weight: 400; }
.nativelead { font-size: 11px; background: color-mix(in srgb, var(--muted) 14%, transparent); color: var(--muted); padding: 4px 8px; }
.nativego { border: 0; background: var(--surface); color: var(--text); width: 34px; height: 34px; border-radius: 10px; font-size: 18px; cursor: pointer; flex: none; box-shadow: var(--shadow-sm); transition: transform 0.12s, color 0.15s; }
.nativego:hover:not(:disabled) { color: #0a84ff; }
.nativego:active:not(:disabled) { transform: scale(0.9); }
.nativego:disabled { opacity: 0.4; cursor: default; }

.mixrow { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px 14px; box-shadow: var(--shadow-sm); }
.mixrow-label { font-family: var(--font-display); font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
.mixrow-label small { font-weight: 400; font-size: 11px; color: var(--muted); }
.mixtoggle { position: relative; width: 46px; height: 27px; border-radius: 999px; border: 0; cursor: pointer; background: var(--surface-2); border: 1px solid var(--border); transition: background 0.2s; flex: none; }
.mixtoggle.on { background: linear-gradient(90deg, #ff3b5c, #0a84ff, #a557ff); border-color: transparent; }
.mixtoggle span { position: absolute; top: 2px; left: 2px; width: 21px; height: 21px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.25); transition: transform 0.22s cubic-bezier(.34,1.4,.4,1); }
.mixtoggle.on span { transform: translateX(19px); }
.quizlangtag { font-family: var(--font-display); font-weight: 700; font-size: 11px; padding: 4px 9px; border-radius: 999px; background: color-mix(in srgb, var(--qc, #0a84ff) 14%, var(--surface)); color: var(--qc, #0a84ff); }

/* ===== Sponsor recommendation card ===== */
.adcard {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px 16px; box-shadow: var(--shadow-sm); position: relative;
  animation: adin 0.4s cubic-bezier(.34,1.3,.5,1) both; margin-top: 2px;
}
@media (prefers-reduced-motion: no-preference) { @keyframes adin { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } } }
.adcard-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; }
.adlabel { display: flex; align-items: center; gap: 6px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }
.addot { width: 6px; height: 6px; border-radius: 50%; background: linear-gradient(90deg,#34c759,#0a84ff); }
.adclose { border: 0; background: transparent; color: var(--muted); font-size: 18px; cursor: pointer; width: 24px; height: 24px; border-radius: 7px; line-height: 1; opacity: 0.6; }
.adclose:hover { opacity: 1; background: var(--surface-2); }
.adcard-body { display: flex; align-items: center; gap: 13px; margin-bottom: 14px; }
.adicon { width: 46px; height: 46px; border-radius: 13px; flex: none; display: flex; align-items: center; justify-content: center; color: #fff; font-family: var(--font-display); font-weight: 700; font-size: 22px; box-shadow: var(--shadow-sm); }
.adtext { min-width: 0; }
.adtitle { font-family: var(--font-display); font-weight: 600; font-size: 15.5px; letter-spacing: -0.01em; margin-bottom: 3px; }
.addesc { font-size: 12.5px; color: var(--muted); line-height: 1.4; text-wrap: pretty; }
.adcta { display: block; text-align: center; text-decoration: none; border-radius: 13px; padding: 13px; font-family: var(--font-display); font-weight: 600; font-size: 14.5px; color: var(--text); background: var(--surface-2); border: 1px solid var(--border); transition: all 0.15s; }
.adcta:hover { border-color: color-mix(in srgb, #0a84ff 45%, transparent); color: #0a84ff; }
.adcta:active { transform: scale(0.98); }

/* ===== Learn module ===== */
.levelrow { display: flex; align-items: center; gap: 12px; }
.lvl-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; flex: none; }
.lvl-seg { display: flex; flex: 1; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 3px; gap: 2px; }
.lvl-btn { flex: 1; border: 0; background: transparent; cursor: pointer; padding: 8px 0; border-radius: 9px; font-family: var(--font-display); font-weight: 600; font-size: 12.5px; color: var(--muted); transition: all 0.15s; }
.lvl-btn.on { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }
.nativewrap { position: relative; flex: 1; }
.nativesel { width: 100%; appearance: none; -webkit-appearance: none; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); border-radius: 12px; padding: 10px 34px 10px 13px; font-family: var(--font-display); font-weight: 600; font-size: 13.5px; cursor: pointer; outline: 0; transition: border-color 0.2s; }
.nativesel:focus { border-color: #0a84ff; }
.nativecaret { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--muted); font-size: 11px; }
.learnselrow { margin-bottom: 4px; }
.learnsel .nativesel { font-family: var(--font-display); font-weight: 700; font-size: 15px; padding: 12px 36px 12px 14px; background: var(--surface); }

.learn-list { display: flex; flex-direction: column; gap: 12px; }
.lcard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow-sm); animation: fade 0.3s ease both; }
.lcard-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); font-weight: 700; margin-bottom: 9px; }
.lc-name { font-family: var(--font-display); font-weight: 700; font-size: 19px; letter-spacing: -0.01em; margin-bottom: 7px; }
.lc-target { font-size: 15px; line-height: 1.55; margin: 0 0 7px; color: var(--text); text-wrap: pretty; }
.lc-native { font-size: 13.5px; line-height: 1.55; margin: 0; color: var(--muted); text-wrap: pretty; }
.lcard.explain { border-left: 4px solid #0a84ff; }
.lcard.formcard { border-left: 4px solid var(--lang-color, #34c759); }
.formhint { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.formhint-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 700; }
.formhint-val { font-family: var(--mono); font-weight: 700; font-size: 16px; color: var(--text); background: var(--surface-2); border: 1px solid var(--border); padding: 4px 11px; border-radius: 10px; }
.formtable { background: var(--surface-2); border-radius: 12px; padding: 10px 12px; }
.formtable-cap { font-size: 12px; color: var(--muted); margin-bottom: 7px; }
.formtable-cap b { font-family: var(--font-display); color: var(--text); }
.formwrap { display: flex; flex-wrap: wrap; gap: 6px 10px; }
.formitem { font-family: var(--mono); font-size: 14px; color: var(--text); }
.formitem:not(:last-child)::after { content: "·"; color: var(--muted); margin-left: 10px; }
.formend { color: var(--lang-color, #0a84ff); font-weight: 700; }
.lcard.irrcard { border-left: 4px solid #ff7a18; }
.irrchips { display: flex; flex-wrap: wrap; gap: 8px; }
.irrchip { border: 1.5px solid color-mix(in srgb, #ff7a18 40%, var(--border)); background: color-mix(in srgb, #ff7a18 9%, var(--surface)); color: var(--text); border-radius: 999px; padding: 8px 14px; font-family: var(--font-display); font-weight: 700; font-size: 15px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: transform 0.12s, background 0.15s; }
.irrchip:active { transform: scale(0.94); }
.irrchip-go { font-size: 12px; color: #d4660a; }
.irrnote { font-size: 12.5px; color: var(--muted); margin: 10px 0 0; font-style: italic; }
.auxnote { font-size: 13px; color: var(--text); margin: 0 0 14px; line-height: 1.5; }
.auxnote b { font-family: var(--mono); color: var(--lc, var(--text)); font-weight: 700; }
.auxblock { margin-bottom: 14px; }
.auxblock-head { font-family: var(--font-display); font-weight: 700; font-size: 13.5px; color: var(--lc, var(--text)); margin-bottom: 6px; }
.auxtable { width: 100%; border-collapse: collapse; background: var(--surface-2); border-radius: 12px; overflow: hidden; }
.auxtable td { padding: 6px 12px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: baseline; }
.auxtable tr:last-child td { border-bottom: 0; }
.auxt-pron { color: var(--muted); white-space: nowrap; width: 1%; }
.auxt-aux { font-family: var(--mono); font-weight: 700; color: var(--lc, var(--text)); white-space: nowrap; }
.auxt-part { font-family: var(--mono); color: var(--text); width: 99%; }
.auxpart { font-size: 12.5px; color: var(--muted); margin-top: 6px; }
.auxpart b { font-family: var(--mono); color: var(--text); }
.auxex { margin-top: 7px; padding: 8px 12px; background: color-mix(in srgb, var(--lc, #0a84ff) 7%, var(--surface)); border-left: 3px solid color-mix(in srgb, var(--lc, #0a84ff) 45%, var(--border)); border-radius: 8px; }
.auxex-t { font-family: var(--font-display); font-weight: 600; font-size: 13.5px; color: var(--text); }
.auxex-row { display: flex; align-items: flex-start; gap: 8px; }
.auxex-row .auxex-t { flex: 1; }
.auxex .exrefresh { flex: none; }
.auxex-n { font-size: 12.5px; color: var(--muted); font-style: italic; margin-top: 2px; }
.lcard.mnemo { background: color-mix(in srgb, #ffc400 9%, var(--surface)); border-color: color-mix(in srgb, #ffc400 32%, transparent); }
.lc-native.big { font-size: 15px; color: var(--text); font-weight: 500; }

.sigwords { display: flex; flex-wrap: wrap; gap: 8px; }
.sigchip { display: inline-flex; flex-direction: column; background: var(--surface-2); border: 1px solid var(--border); border-radius: 11px; padding: 7px 11px; line-height: 1.25; }
.sigchip b { font-family: var(--mono); font-weight: 600; font-size: 13px; color: var(--text); }
.sigchip i { font-style: normal; font-size: 11px; color: var(--muted); }

.exlist { display: flex; flex-direction: column; gap: 12px; }
.exrow { border-left: 3px solid color-mix(in srgb, #34c759 50%, transparent); padding-left: 12px; }
.exmain { display: flex; align-items: flex-start; gap: 8px; }
.exline { flex: 1; font-size: 14.5px; line-height: 1.5; color: var(--text); text-wrap: pretty; }
.exverb { font-weight: 700; color: #0a84ff; background: color-mix(in srgb, #0a84ff 12%, transparent); border-radius: 4px; padding: 0 3px; }
.exnative { font-size: 13px; color: var(--muted); margin-top: 3px; line-height: 1.45; text-wrap: pretty; }
.exrow .speakbtn { margin-top: -3px; }

.usegrid { display: flex; flex-direction: column; gap: 12px; }
.usecol { display: flex; flex-direction: column; gap: 7px; }
.useli { display: flex; align-items: flex-start; gap: 9px; font-size: 13.5px; line-height: 1.45; color: var(--text); text-wrap: pretty; }
.usei { flex: none; font-size: 12px; font-weight: 700; width: 18px; height: 18px; border-radius: 6px; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
.usei.ok { color: #1a9b46; background: color-mix(in srgb, #34c759 16%, transparent); }
.usei.no { color: #d4660a; background: color-mix(in srgb, #ff7a18 16%, transparent); }

.cmp { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.cmp-row { display: grid; grid-template-columns: 1fr 1fr; }
.cmp-row > span { padding: 10px 12px; font-size: 12.5px; line-height: 1.4; color: var(--text); border-top: 1px solid var(--border); }
.cmp-row > span:first-child { border-right: 1px solid var(--border); }
.cmp-row.head > span { background: var(--surface-2); font-family: var(--font-display); font-weight: 700; font-size: 12px; color: var(--text); border-top: 0; }
.cmp-note { margin-top: 10px; }

.lcard.skel .sk-line { height: 12px; border-radius: 6px; background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 37%, var(--surface-2) 63%); background-size: 400% 100%; animation: shimmer 1.3s ease infinite; margin-bottom: 10px; }
.sk-line.w40 { width: 40%; } .sk-line.w70 { width: 70%; } .sk-line.w90 { width: 90%; }
@keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }
.learn-fallback { display: flex; flex-direction: column; gap: 12px; }

/* ===== Onboarding name gate ===== */
.brand-greet { border: 0; background: transparent; padding: 2px 0 0; margin: 0; cursor: pointer; font-family: var(--font-body); font-size: 12px; color: var(--muted); letter-spacing: 0.01em; text-align: left; }
.brand-greet:hover { color: var(--text); }
.namegate { position: absolute; inset: 0; z-index: 40; display: flex; align-items: center; justify-content: center; padding: 24px; background: color-mix(in srgb, var(--bg) 88%, rgba(0,0,0,0.35)); animation: fade 0.3s ease; }
.namecard { position: relative; width: 100%; max-width: 340px; background: var(--surface); border: 1px solid var(--border); border-radius: 26px; box-shadow: var(--shadow); padding: 30px 24px 22px; display: flex; flex-direction: column; align-items: center; text-align: center; animation: fade 0.3s ease both; }
.namex { position: absolute; top: 14px; right: 14px; border: 0; background: var(--surface-2); color: var(--muted); width: 30px; height: 30px; border-radius: 50%; font-size: 18px; cursor: pointer; line-height: 1; }
.brand-mark.big { width: 52px; height: 52px; padding: 7px; border-radius: 16px; gap: 4px; margin-bottom: 16px; }
.namehead { font-family: var(--font-display); font-weight: 600; font-size: 23px; letter-spacing: -0.02em; margin: 0 0 8px; }
.namehead b { font-weight: 700; background: linear-gradient(90deg, #0a84ff, #a557ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
.namesub { font-size: 13.5px; line-height: 1.5; color: var(--muted); margin: 0 0 20px; text-wrap: pretty; }
.nameinput { width: 100%; border: 1.5px solid var(--border); background: var(--surface-2); border-radius: 15px; padding: 15px 16px; font-family: var(--font-display); font-weight: 600; font-size: 17px; color: var(--text); outline: 0; text-align: center; transition: border-color 0.2s, box-shadow 0.2s; }
.nameinput:focus { border-color: #0a84ff; box-shadow: 0 0 0 4px rgba(10,132,255,0.12); }
.namebtn { position: relative; width: 100%; border: 0; cursor: pointer; border-radius: 15px; padding: 15px; margin-top: 12px; font-family: var(--font-display); font-weight: 700; font-size: 16px; color: #fff; overflow: hidden; box-shadow: 0 14px 30px -12px rgba(120, 40, 200, 0.6); transition: transform 0.14s, opacity 0.2s; }
.namebtn:active { transform: scale(0.97); }
.namebtn:disabled { opacity: 0.5; cursor: default; }
.namebtn .cta-label { position: relative; z-index: 2; }
.nameskip { border: 0; background: transparent; color: var(--muted); font-size: 12.5px; cursor: pointer; margin-top: 12px; padding: 4px; }
.nameskip:hover { color: var(--text); text-decoration: underline; }
.namefield { width: 100%; margin-top: 12px; text-align: left; }
.namelabel { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; margin: 0 0 6px 2px; }
.namefield .nativewrap { width: 100%; }
.skillseg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
.skillbtn { display: flex; flex-direction: column; align-items: center; gap: 2px; border: 1.5px solid var(--border); background: var(--surface-2); border-radius: 13px; padding: 10px 4px; cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.12s; }
.skillbtn b { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--text); }
.skillbtn small { font-size: 10px; color: var(--muted); }
.skillbtn.on { border-color: #0a84ff; background: color-mix(in srgb, #0a84ff 10%, var(--surface)); }
.skillbtn.on b { color: #0a84ff; }
.skillbtn:active { transform: scale(0.96); }

/* ===== Quiz: choice + speed modes ===== */

/* ===== Onboarding tour — modern mini app-screenshots ===== */

}

/* ===== Voice quiz mic ===== */
.micbtn { width: 84px; height: 84px; border-radius: 50%; border: 0; cursor: pointer; font-size: 34px; color: #fff; background: var(--lc, #0a84ff); box-shadow: 0 14px 30px -10px color-mix(in srgb, var(--lc, #0a84ff) 70%, transparent);rgba(120,40,200,0.6); align-self: center; margin: 6px 0; transition: transform 0.14s; }

.micwrap { display: flex; flex-direction: column; align-items: center; gap: 9px; }

.spkreveal { width: 100%; background: var(--surface-2); border: 1px solid color-mix(in srgb, var(--lc, #0a84ff) 30%, var(--border)); border-radius: 14px; padding: 13px 15px; display: flex; flex-direction: column; gap: 6px; }

.wsent { line-height: 1.7; }
.wsent.big { font-family: var(--font-display); font-weight: 600; font-size: 17px; color: var(--text); }
.wword { position: relative; cursor: pointer; border-radius: 5px; padding: 1px 2px; transition: background 0.12s; text-decoration: underline; text-decoration-style: dotted; text-decoration-color: color-mix(in srgb, var(--lc, #0a84ff) 50%, transparent); text-underline-offset: 3px; }
.wword:hover { background: color-mix(in srgb, var(--lc, #0a84ff) 12%, transparent); }
.wword.open { background: color-mix(in srgb, var(--lc, #0a84ff) 16%, transparent); }
.wpop { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); margin-bottom: 6px; background: var(--text); color: var(--surface); font-family: var(--font-body); font-weight: 600; font-size: 12.5px; white-space: nowrap; padding: 4px 9px; border-radius: 8px; box-shadow: var(--shadow); z-index: 20; }
.wpop::after { content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: var(--text); }
.spkreveal-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; color: var(--muted); }
.spkreveal-row { display: flex; align-items: center; gap: 10px; }

.spksent { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; }

.qmode:active { transform: scale(0.95); }

  function build(verb, data) {
    const present = data.present;
    const impStem = data.pprStem != null ? data.pprStem : present[3].replace(/ons$/, "");
    const imparfait = data.imparfait || E_IMPARF.map(e => impStem + e);
    const futur = E_FUT.map(e => data.futStem + e);

      ? ["étais","étais","était","étions","étiez","étaient"]
      : ["avais","avais","avait","avions","aviez","avaient"];
    const pqp = auxImp.map(a => data.pp === "—" ? "—" : `${a} ${data.pp}`);
    const auxCond = data.aux === "être"
      ? ["serais","serais","serait","serions","seriez","seraient"]
      : ["aurais","aurais","aurait","aurions","auriez","auraient"];
    const condPasse = auxCond.map(a => data.pp === "—" ? "—" : `${a} ${data.pp}`);

    let imp = data.imp;
    if (!imp) { let tu = present[1]; if (data.erType) tu = tu.replace(/s$/, ""); imp = ["—", tu, "—", present[3], present[4], "—"]; }

      { id: "present", label: "Présent", forms: present },
      { id: "past", label: "Imparfait", forms: imparfait },
      { id: "perfect", label: "Passé composé", forms: pc },

      { id: "conditionalPast", label: "Conditionnel passé", forms: condPasse },
      { id: "imperative", label: "Impératif", forms: imp },
      { id: "gerund", label: "Participe présent", forms: PRON.map(() => ppr) }
    ];
  }

  function conjugate(input) {
    const verb = clean(input);
    if (!verb) return null;
    const reg = regularData(verb);
    if (!reg) return { error: "French verbs end in -er, -ir or -re. Try e.g. parler, finir, vendre." };

    let data = reg, isIrr = false;

    if (isIrr) { const regT = build(verb, reg); tenses.forEach((t, i) => { t.reg = regT[i].forms; }); }

<script>
/* ===== Google Gemini AI bridge — rate-limited queue ===== */
(function(){
  var KEY = atob('QVEuQWI4Uk42S0lqcDZ1WHAzNmV0alZfTjRtUDVWeFhPZkRpLVk5Zl9HcFJ5NjJITWhIelE=');
  var MODEL = 'gemini-2.5-flash-lite';
  var queue = [], busy = false, lastCall = 0, INTERVAL = 2200;
  function delay(ms){ return new Promise(function(r){setTimeout(r,ms);}); }
  async function callGemini(prompt, attempt){
    attempt = attempt || 0;
    var resp = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/'+MODEL+':generateContent?key='+KEY,
      { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.5, maxOutputTokens:700} })
      }
    );
    var d = await resp.json();
    if(d.error){
      if((d.error.code===429 || d.error.status==='RESOURCE_EXHAUSTED') && attempt < 5){
        await delay(3000 * (attempt + 1));
        return callGemini(prompt, attempt + 1);
      }
      throw new Error(d.error.message);
    }
    return ((d.candidates||[])[0]||{content:{parts:[{text:''}]}}).content.parts[0].text || '';
  }
  async function processQueue(){
    if(busy) return; busy = true;
    while(queue.length){
      var wait = lastCall + INTERVAL - Date.now();
      if(wait > 0) await delay(wait);
      var item = queue.shift();
      lastCall = Date.now();
      try{ item.resolve(await callGemini(item.prompt)); }
      catch(e){ item.reject(e); }
    }
    busy = false;
  }
  function enqueue(prompt){
    return new Promise(function(resolve,reject){
      queue.push({prompt:prompt,resolve:resolve,reject:reject});
      processQueue();
    });
  }
  window.claude = { complete: enqueue };
  window.__hasAI = function(){ return true; };
  window.aiComplete = enqueue;
})();
</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

function verbPool(langCode) {
  const eng = window.CONJ[langCode];
  const set = new Set(eng.samples || []);
  (eng.irregulars || []).forEach((v) => set.add(v));
  (EXTRA_VERBS[langCode] || []).forEach((v) => set.add(v));
  (EXTRA_VERBS2[langCode] || []).forEach((v) => set.add(v));
  if (langCode === "es" || langCode === "en") (EXTRA_VERBS3[langCode] || []).forEach((v) => set.add(v));
  const trd = window.TRANS[langCode];
  if (trd) Object.keys(trd).forEach((k) => set.add(k));
  const idx = _LIDX[langCode];
  if (idx != null) CONCEPTS.forEach((row) => {if (row[idx]) set.add(row[idx]);});
  return Array.from(set);
}

/* Quiz pool graded by learner level:
   beginner = common verbs + most-frequent irregulars;
   intermediate = + all irregulars + extra common batch;
   advanced = everything available. */
function quizPool(langCode, skill) {
  const eng = window.CONJ[langCode];
  const irr = eng.irregulars || [];
  const set = new Set();
  (eng.samples || []).forEach((v) => set.add(v));
  (EXTRA_VERBS[langCode] || []).forEach((v) => set.add(v));
  if (skill === "beginner") {
    irr.slice(0, 24).forEach((v) => set.add(v));
  } else {
    irr.forEach((v) => set.add(v));
    (EXTRA_VERBS2[langCode] || []).forEach((v) => set.add(v));
  }
  if (skill === "advanced") {
    if (langCode === "es" || langCode === "en") (EXTRA_VERBS3[langCode] || []).forEach((v) => set.add(v));
    const trd = window.TRANS[langCode];
    if (trd) Object.keys(trd).forEach((k) => set.add(k));
  }
  return Array.from(set);
}

/* Is the raw input a known dictionary (infinitive) verb? We check pool
   membership rather than "does it conjugate", because German/Dutch accept any
   -en word as an infinitive — which would hide participles like "gegessen". */
function isKnownInfinitive(langCode, raw) {
  const v = (raw || "").trim().toLowerCase().replace(/^to /, "");
  if (!v) return false;
  return verbPool(langCode).indexOf(v) >= 0;
}

/* Infinitive endings per language, ordered by how common/productive the class
   is (first = highest priority when an ending is ambiguous). */
const INF_SUF = { es: ["ar", "er", "ir"], fr: ["er", "re", "ir"], de: ["en", "n"], nl: ["en", "n"], en: [] };

/* Generate plausible infinitives for an inflected form, to be *verified* by
   re-conjugation. For es/fr/de/nl: the infinitive is either a prefix of the
   form (future/conditional are built on the infinitive) or stem+ending. */
function ruleCandidates(langCode, input) {
  if (langCode === "en") return enCandidates(input);
  const suf = INF_SUF[langCode] || [];
  const set = new Set();
  const L = input.length;
  for (let k = Math.max(2, L - 7); k <= L; k++) {
    const pre = input.slice(0, k);
    set.add(pre);
    suf.forEach((s) => set.add(pre + s));
  }

}
function enCandidates(w) {
  const c = new Set();
  const undbl = (s) => s.length > 1 && s[s.length - 1] === s[s.length - 2] ? s.slice(0, -1) : null;
  if (w.endsWith("ing")) {const s = w.slice(0, -3);c.add(s);c.add(s + "e");const d = undbl(s);if (d) c.add(d);}
  if (w.endsWith("ied")) {c.add(w.slice(0, -3) + "y");}
  if (w.endsWith("ed")) {const s = w.slice(0, -2);c.add(s);c.add(s + "e");const d = undbl(s);if (d) c.add(d);c.add(w.slice(0, -1));}
  if (w.endsWith("ies")) {c.add(w.slice(0, -3) + "y");}
  if (w.endsWith("es")) {c.add(w.slice(0, -2));c.add(w.slice(0, -1));}
  if (w.endsWith("s") && !w.endsWith("ss")) {c.add(w.slice(0, -1));}

  let min = Infinity;
  groups.forEach((g) => {min = Math.min(min, g.base.length);});
  Array.from(groups.entries()).forEach(([k, g]) => {if (g.base.length > min) groups.delete(k);});
  const order = INF_SUF[langCode] || [];
  if (order.length) {
    const pri = (b) => {for (let k = 0; k < order.length; k++) if (b.endsWith(order[k])) return order.length - k;return 0;};
    let best = 0;groups.forEach((g) => {best = Math.max(best, pri(g.base));});
    Array.from(groups.entries()).forEach(([k, g]) => {if (pri(g.base) < best) groups.delete(k);});

function deconjugate(langCode, raw) {
  const input = norm(raw);
  if (!input) return null;
  const eng = window.CONJ[langCode];
  const pool = verbPool(langCode);
  const groups = new Map(); // inf|tenseId -> analysis
  const dinput = deburr(input);

  function record(r, t, i, allSame) {
    const ib = infBase(langCode, r.infinitive);
    const key = ib + "|" + t.id;
    let g = groups.get(key);
    if (!g) {g = { infinitive: r.infinitive, base: ib, isIrregular: r.isIrregular, tenseId: t.id, tenseLabel: t.label, indices: [], pronouns: [], noPerson: allSame };groups.set(key, g);}
    if (g.indices.indexOf(i) < 0) {g.indices.push(i);g.pronouns.push(r.pronouns[i]);}
  }
  function scan(matchFn) {
    pool.forEach((cand) => {
      const r = eng.conjugate(cand);
      if (!r || r.error) return;
      r.tenses.forEach((t) => {
        if (!t.forms) return;
        const allSame = t.forms.every((f) => f === t.forms[0]);
        t.forms.forEach((f, i) => {if (f && f !== "—" && matchFn(norm(f))) record(r, t, i, allSame);});
      });
    });
  }

  scan((f) => f === input); // 1) exact full-form match

  if (groups.size === 0) {// 2) bare participle / gerund inside compound tenses
    const isGerund = /(ndo|ant|ing)$/.test(input); // -ndo (es), -ant (fr), -ing (en)
    pool.forEach((cand) => {
      const r = eng.conjugate(cand);
      if (!r || r.error) return;
      r.tenses.forEach((t) => {
        if (!t.forms) return;
        t.forms.forEach((f) => {
          if (!f || f === "—" || f.indexOf(" ") < 0) return;
          if (norm(f.split(" ").pop()) === input) {
            const ib = infBase(langCode, r.infinitive);
            const key = ib + (isGerund ? "|__ger" : "|__pp");
            if (!groups.has(key)) groups.set(key, { infinitive: r.infinitive, base: ib, isIrregular: r.isIrregular, tenseId: isGerund ? "gerund" : "participle", tenseLabel: isGerund ? tr("dq_gerund") : tr("dq_participle"), indices: [], pronouns: [], noPerson: true });
          }
        });
      });
    });
  }

  let fuzzy = false;
  if (groups.size === 0 && dinput !== input) {// 3) accent-insensitive fallback
    fuzzy = true;
    scan((f) => deburr(f) === dinput);
  }

  let guessed = false;
  if (groups.size === 0) {// 4) rule-based reconstruction (verified by re-conjugation)
    const isGer = /(ndo|ant|ing)$/.test(input);
    ruleCandidates(langCode, input).forEach((cand) => {
      const r = eng.conjugate(cand);
      if (!r || r.error) return;
      if (infBase(langCode, r.infinitive) !== cand) return; // candidate must be its own clean infinitive
      r.tenses.forEach((t) => {
        if (!t.forms) return;
        const allSame = t.forms.every((f) => f === t.forms[0]);
        t.forms.forEach((f, i) => {
          if (!f || f === "—") return;
          if (norm(f) === input) record(r, t, i, allSame);else
          if (f.indexOf(" ") >= 0 && norm(f.split(" ").pop()) === input) {
            const ib = infBase(langCode, r.infinitive);
            const key = ib + (isGer ? "|__ger" : "|__pp");
            if (!groups.has(key)) groups.set(key, { infinitive: r.infinitive, base: ib, isIrregular: r.isIrregular, tenseId: isGer ? "gerund" : "participle", tenseLabel: isGer ? tr("dq_gerund") : tr("dq_participle"), indices: [], pronouns: [], noPerson: true });
          }
        });
      });
    });
    if (groups.size > 0) {guessed = true;pruneGuess(langCode, groups);}
  }

  if (groups.size === 0) return null;
  const analyses = Array.from(groups.values());
  const infinitives = [];
  analyses.forEach((a) => {if (!infinitives.some((x) => x.base === a.base)) infinitives.push({ infinitive: a.infinitive, base: a.base, isIrregular: a.isIrregular });});
  return { input: (raw || "").trim(), analyses, infinitives, fuzzy, guessed };
}

  const eng = window.CONJ[langCode];

    const FR_ETRE = { ai: "suis", as: "es", a: "est", avons: "sommes", avez: "êtes", ont: "sont", avais: "étais", avait: "était", avions: "étions", aviez: "étiez", avaient: "étaient" };

  list.unshift({ verb: q.verb, tenseLabel: q.tenseLabel, pronoun: q.pronoun, answer: q.answer, options: q.options, isIrregular: q.isIrregular, ttsLang: q.ttsLang, lang });

/* Daily goal + streak */
const DAILY_GOAL = 12;
function readDaily() {
  const today = new Date().toDateString();
  const y = new Date(Date.now() - 86400000).toDateString();
  const d = recall("kunju-daily", { date: "", count: 0 });
  const st = recall("kunju-streak", { last: "", streak: 0, best: 0 });
  const count = d.date === today ? d.count : 0;
  let streak = st.streak || 0;
  if (st.last !== today && st.last !== y) streak = 0;
  return { count, goal: DAILY_GOAL, streak, best: st.best || 0 };
}

  const today = new Date().toDateString();
  const y = new Date(Date.now() - 86400000).toDateString();

  if (d.date !== today) d = { date: today, count: 0 };
  d.count += 1;persist("kunju-daily", d);
  let st = recall("kunju-streak", { last: "", streak: 0, best: 0 });
  if (d.count >= DAILY_GOAL && st.last !== today) {
    st.streak = st.last === y ? (st.streak || 0) + 1 : 1;
    st.last = today;st.best = Math.max(st.best || 0, st.streak);
    persist("kunju-streak", st);
  }

}

    const prompt = `Write ONE short, natural everyday sentence in ${engineName} (max 9 words) ${formInstr}${freshTxt}${sepNote} The sentence MUST be fully grammatical and idiomatic: use the verb with its correct case government, prepositions and subject (e.g. dative verbs like "gefallen"/"helfen" take a dative object; in German say "auf der Party", not "in der Party"). The sentence MUST end with proper punctuation (. ! or ?).${checkNote} ${sameLang ? `For "n", repeat the same sentence WITHOUT the asterisks.` : `For "n", give a natural ${native} translation of the whole sentence.`} Do NOT use any double-quote (") character inside either sentence. Reply with ONLY minified JSON and nothing else, exactly: {"s":"...","n":"..."}`;

/* ---------- Quiz ---------- */
function pick(arr) {return arr[Math.floor(Math.random() * arr.length)];}
function shuffle(arr) {const a = arr.slice();for (let i = a.length - 1; i > 0; i--) {const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]];}return a;}
function norm(s) {return (s || "").trim().toLowerCase().replace(/\s+/g, " ");}

function buildQuestion(lang, tenseId, pool) {
  const eng = window.CONJ[lang];
  for (let tries = 0; tries < 22; tries++) {
    const v = pick(pool);
    const r = eng.conjugate(v);
    if (!r || r.error) continue;
    let t;
    if (tenseId === "all") t = pick(r.tenses);else
    if (Array.isArray(tenseId)) {const avail = r.tenses.filter((x) => tenseId.indexOf(x.id) >= 0);if (!avail.length) continue;t = pick(avail);} else
    {t = r.tenses.find((x) => x.id === tenseId);if (!t) continue;}
    const idxs = [];t.forms.forEach((f, i) => {if (f && f !== "—") idxs.push(i);});
    if (!idxs.length) continue;
    const pi = pick(idxs);
    const answer = t.forms[pi];
    // distractors: prefer forms from the same selected tense(s); only widen if too few
    const allowed = tenseId === "all" ? null : Array.isArray(tenseId) ? tenseId : [tenseId];
    const cand = new Set();
    r.tenses.forEach((tt) => {if (allowed && allowed.indexOf(tt.id) < 0) return;tt.forms.forEach((f) => {if (f && f !== "—" && norm(f) !== norm(answer)) cand.add(f);});});
    if (cand.size < 3) r.tenses.forEach((tt) => tt.forms.forEach((f) => {if (f && f !== "—" && norm(f) !== norm(answer)) cand.add(f);}));
    const distract = shuffle([...cand]).slice(0, 3);
    const options = shuffle([answer, ...distract]);
    return { lang, verb: r.infinitive, tenseId: t.id, tenseLabel: t.label, pronoun: r.pronouns[pi], answer, options, isIrregular: r.isIrregular, ttsLang: eng.ttsLang };
  }
  return null;
}

/* Tappable sentence: tap a word to see its translation (shown as a stable chip
   below — robust on mobile, never clipped). Direction set via from/to. */
function WordSentence({ text, fromName, toName, cachePrefix, big, accent, saveLang, saveDir }) {
  const [openW, setOpenW] = useState(null);
  const [trans, setTrans] = useState({});
  const [saved, setSaved] = useState({});
  const parts = (text || "").split(/(\s+)/);
  function clean(w) {return w.replace(/[^\p{L}\p{N}'’\-]/gu, "").toLowerCase();}
  function tap(w, i) {
    const c = clean(w);
    if (!c) return;
    if (openW && openW.i === i) {setOpenW(null);return;}
    setOpenW({ w: c, i });
    if (trans[c] != null) return;
    const key = `${cachePrefix}-${c}`;
    const cached = recall(key, null);
    if (cached != null) {setTrans((t) => ({ ...t, [c]: cached }));return;}
    if (!window.__hasAI()) {setTrans((t) => ({ ...t, [c]: "—" }));return;}
    setTrans((t) => ({ ...t, [c]: "…" }));
    window.aiComplete(`In the ${fromName} sentence "${text}", what does the word "${c}" mean in ${toName}? Reply with ONLY the ${toName} translation, 1–3 words, no punctuation, no extra text.`).
    then((r) => {const out = String(r || "").trim().replace(/^["'.]+|["'.]+$/g, "").split("\n")[0].trim() || "—";persist(key, out);setTrans((t) => ({ ...t, [c]: out }));}).
    catch(() => setTrans((t) => ({ ...t, [c]: "—" })));
  }
  function saveWord() {
    if (!saveLang || !openW) return;
    const c = openW.w;
    function afterTrans(tvRaw) {
      const tv = (!tvRaw || tvRaw === "…" || tvRaw === "—") ? "" : tvRaw;
      const term = saveDir === "fromTarget" ? c : (tv || c);
      const native = saveDir === "fromTarget" ? tv : c;
      const cats = templateCats();
      function commit(catName) {
        const entry = { id: Date.now() + "", lang: saveLang, term, trans: native, cat: catName, kind: "word", created: Date.now(), nat: recall("kunju-native", "German") };
        const list = getVocab();
        if (!list.some((x) => x.lang === entry.lang && norm(x.term) === norm(entry.term))) saveVocab([entry, ...list]);
        setSaved((s) => ({ ...s, [c]: true }));
      }
      const ck = `kunju-vcat-${saveLang}-${norm(term)}`;
      const cached = recall(ck, null);
      if (cached) {commit(cached);return;}
      if (!window.__hasAI()) {commit(generalCat());return;}
      window.aiComplete(`Which ONE category best fits the word "${term}"${native ? ` (meaning "${native}")` : ""}? Choose exactly one from this list: ${cats.join(", ")}, ${generalCat()}. If none clearly fits, answer "${generalCat()}". Reply with ONLY the category name, nothing else.`).
      then((r) => {const p = String(r || "").trim().replace(/[".]/g, "");const match = [...cats, generalCat()].find((x) => x.toLowerCase() === p.toLowerCase()) || generalCat();persist(ck, match);commit(match);}).
      catch(() => commit(generalCat()));
    }
    setSaved((s) => ({ ...s, [c]: "saving" }));
    const have = trans[c];
    if (have && have !== "…" && have !== "—") {afterTrans(have);return;}
    // translation not loaded yet — fetch it, then save
    const tkey = `${cachePrefix}-${c}`;
    const tc = recall(tkey, null);
    if (tc != null) {setTrans((t) => ({ ...t, [c]: tc }));afterTrans(tc);return;}
    if (!window.__hasAI()) {afterTrans("");return;}
    window.aiComplete(`In the ${fromName} sentence "${text}", what does the word "${c}" mean in ${toName}? Reply with ONLY the ${toName} translation, 1–3 words, no punctuation, no extra text.`).
    then((r) => {const out = String(r || "").trim().replace(/^["'«».]+|["'«».]+$/g, "").split("\n")[0].trim();if (out) {persist(tkey, out);setTrans((t) => ({ ...t, [c]: out }));}afterTrans(out);}).
    catch(() => afterTrans(""));
  }
  return (
    <div className="wsentwrap">
      <div className={"wsent" + (big ? " big" : "") + (accent ? " accent" : "")}>
        {parts.map((w, i) => /^\s+$/.test(w) || !clean(w) ? <span key={i}>{w}</span> :
        <span key={i} className={"wword" + (openW && openW.i === i ? " open" : "")} onClick={() => tap(w, i)}>{w}</span>
        )}
      </div>
      {openW && <div className="wtrans"><b>{openW.w}</b> → <span>{trans[openW.w] || "…"}</span>
        {saveLang && (
        saved[openW.w] === "saving" ?
        <span className="wsave saved">…</span> :
        saved[openW.w] ?
        <span className="wsave saved">✓ {tr("vocab_saved")}</span> :
        <button className="wsave" onClick={saveWord}>+ {tr("vocab_save")}</button>)}
      </div>}
    </div>);

}

function hl3(inf, form) {
  const f = esc(form);
  const stem = (inf || "").replace(/^to /, "").replace(/(ar|er|ir|en|re|n)$/, "");
  if (stem && stem.length >= 2 && form.toLowerCase().indexOf(stem.toLowerCase()) === 0) {
    return esc(form.slice(0, stem.length)) + '<b class="formend">' + esc(form.slice(stem.length)) + "</b>";
